<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课程体系原型 - 导航页</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f5f5;
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
    color: #333;
  }
  .container { text-align: center; }
  h1 { font-size: 24px; font-weight: 500; margin-bottom: 8px; }
  p { font-size: 14px; color: #888; margin-bottom: 32px; }
  .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .card {
    background: #fff; border-radius: 12px; padding: 32px 40px;
    text-decoration: none; color: #333; width: 240px;
    border: 1px solid #e8e8e8; transition: all 0.2s;
  }
  .card:hover { border-color: #378ADD; transform: translateY(-2px); }
  .card h2 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
  .card p { font-size: 13px; color: #999; margin-bottom: 0; }
</style>
</head>
<body>
<div class="container">
  <h1>课程体系原型</h1>
  <p>HTML 静态原型预览</p>
  <div class="cards">
    <a href="课程体系前端展示.html" class="card">
      <h2>前端展示</h2>
      <p>用户端课程浏览页面</p>
    </a>
    <a href="课程体系管理后台.html" class="card">
      <h2>管理后台</h2>
      <p>管理员课程编排页面</p>
    </a>
  </div>
</div>
</body>
</html>
