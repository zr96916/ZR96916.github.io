<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原型导航</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f5f5; min-height: 100vh; color: #333;
  }
  .header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 20px 32px; }
  .header h1 { font-size: 20px; font-weight: 500; }
  .header p { font-size: 13px; color: #999; margin-top: 4px; }
  .main { max-width: 800px; margin: 32px auto; padding: 0 20px; }
  .org { margin-bottom: 32px; }
  .org-name { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 12px; letter-spacing: 1px; }
  .project {
    background: #fff; border-radius: 10px; border: 1px solid #e8e8e8;
    padding: 20px 24px; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .project:hover { border-color: #378ADD; }
  .project-info h3 { font-size: 15px; font-weight: 500; }
  .project-info p { font-size: 12px; color: #999; margin-top: 2px; }
  .prototypes { display: flex; gap: 10px; }
  .prototypes a {
    padding: 6px 16px; border-radius: 6px; font-size: 13px; text-decoration: none;
    background: #E6F1FB; color: #185FA5; white-space: nowrap;
  }
  .prototypes a:hover { background: #B5D4F4; }
  .footer { text-align: center; font-size: 12px; color: #bbb; padding: 40px 0 20px; }
</style>
</head>
<body>
<div class="header">
  <h1>HTML 原型管理</h1>
  <p>所有项目原型入口</p>
</div>
<div class="main">

  <div class="org">
    <div class="org-name">北京昇腾</div>

    <div class="project">
      <div class="project-info">
        <h3>课程网站</h3>
        <p>课程展示 + 管理后台原型</p>
      </div>
      <div class="prototypes">
        <a href="北京昇腾/课程网站/原型界面/">进入原型</a>
      </div>
    </div>

  </div>

</div>
<div class="footer">更新于 2026-06-25</div>
</body>
</html>
