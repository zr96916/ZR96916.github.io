<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧食安 · 原型导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"DM Sans"', '"PingFang SC"', '"Microsoft YaHei"', 'system-ui', 'sans-serif'],
        },
      }
    }
  }
</script>
<style>
  body { min-height: 100vh; }
  .card {
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.10);
  }
</style>
</head>
<body class="bg-slate-50 font-sans antialiased">
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-xl">
      <!-- 头部 -->
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-emerald-100 text-emerald-600 mb-4">
          <i data-lucide="shield-check" class="w-7 h-7"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-800 mb-2">智慧食安</h1>
        <p class="text-slate-500 text-sm">原型预览导航 · 点击卡片进入对应原型</p>
      </div>

      <!-- 卡片列表 -->
      <div class="space-y-4">
        <!-- 商户小程序 -->
        <a href="智慧食安_商户小程序.html" class="card block bg-white rounded-2xl border border-slate-200 p-5">
          <div class="flex items-center gap-4">
            <div class="w-11 h-11 rounded-xl bg-orange-50 text-orange-500 flex items-center justify-center flex-shrink-0">
              <i data-lucide="smartphone" class="w-5 h-5"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h2 class="text-base font-semibold text-slate-800">商户小程序</h2>
              <p class="text-sm text-slate-400 mt-0.5">移动端商户操作界面</p>
            </div>
            <i data-lucide="arrow-right" class="w-4 h-4 text-slate-300 flex-shrink-0"></i>
          </div>
        </a>

        <!-- 管理PC -->
        <a href="智慧食安_管理PC.html" class="card block bg-white rounded-2xl border border-slate-200 p-5">
          <div class="flex items-center gap-4">
            <div class="w-11 h-11 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center flex-shrink-0">
              <i data-lucide="monitor" class="w-5 h-5"></i>
            </div>
            <div class="flex-1 min-w-0">
              <h2 class="text-base font-semibold text-slate-800">管理后台 PC</h2>
              <p class="text-sm text-slate-400 mt-0.5">桌面端管理操作界面</p>
            </div>
            <i data-lucide="arrow-right" class="w-4 h-4 text-slate-300 flex-shrink-0"></i>
          </div>
        </a>
      </div>

      <!-- 页脚 -->
      <p class="text-center text-xs text-slate-300 mt-8">点击卡片跳转对应原型页面</p>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
