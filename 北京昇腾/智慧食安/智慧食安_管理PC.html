function TrendChart({ data, width = 520, height = 200 }) {
  const points = useMemo(() => {
    if (!data.length) return '';
    const max = Math.max(...data.map(d => d.value));
    const min = 0;
    const range = max - min || 1;
    const pad = 0;
    const w = width - pad * 2;
    const h = height - pad * 2;
    return data.map((d, i) => {
      const x = pad + (i / Math.max(data.length - 1, 1)) * w;
      const y = pad + h - ((d.value - min) / range) * h;
      return `${x},${y}`;
    }).join(' ');
  }, [data, width, height]);

  const areaPath = useMemo(() => {
    if (!data.length) return '';
    const max = Math.max(...data.map(d => d.value));
    const range = max || 1;
    const pad = 0;
    const w = width - pad * 2;
    const h = height - pad * 2;
    let d = '';
    data.forEach((pt, i) => {
      const x = pad + (i / Math.max(data.length - 1, 1)) * w;
      const y = pad + h - ((pt.value) / range) * h;
      d += (i === 0 ? 'M' : 'L') + ` ${x},${y} `;
    });
    d += `L ${pad + w},${pad + h} L ${pad},${pad + h} Z`;
    return d;
  }, [data, width, height]);

  if (!data.length) return <div className="flex items-center justify-center text-ink-muted text-sm" style={{width,height}}>暂无数据</div>;

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#1A56DB" stopOpacity="0.15" />
          <stop offset="100%" stopColor="#1A56DB" stopOpacity="0.01" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill="url(#areaGrad)" />
      <polyline points={points} fill="none" stroke="#1A56DB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {data.map((d, i) => {
        const max = Math.max(...data.map(d => d.value));
        const range = max || 1;
        const pad = 0;
        const w = width - pad * 2;
        const h = height - pad * 2;
        const cx = pad + (i / Math.max(data.length - 1, 1)) * w;
        const cy = pad + h - ((d.value) / range) * h;
        return (
          <g key={i} className="group">
            <circle cx={cx} cy={cy} r="3.5" fill="white" stroke="#1A56DB" strokeWidth="2" />
            <circle cx={cx} cy={cy} r="10" fill="transparent" className="cursor-pointer" />
            <g className="opacity-0 group-hover:opacity-100 transition-opacity">
              <rect x={cx-22} y={cy-28} width="44" height="20" rx="4" fill="#1E293B" />
              <text x={cx} y={cy-13} textAnchor="middle" fill="white" fontSize="10" fontWeight="600">{d.value}</text>
            </g>
          </g>
        );
      })}
    </svg>
  );
}

  const max = Math.max(...data.map(d => d.value), 1);
  const barW = Math.min(28, (width - 40) / data.length - 8);
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      {data.map((d, i) => {
        const barH = (d.value / max) * (height - 36);
        const x = 20 + i * ((width - 40) / data.length) + ((width-40)/data.length - barW)/2;
        const y = height - 20 - barH;
        return (
          <g key={i} className="group">
            <rect x={x} y={y} width={barW} height={barH} rx="3" fill={d.color || '#1A56DB'} opacity="0.85"
              className="transition-all duration-200 hover:opacity-100" />
            <text x={x + barW/2} y={height - 4} textAnchor="middle" fill="#94A3B8" fontSize="9">{d.label}</text>
            <g className="opacity-0 group-hover:opacity-100 transition-opacity">
              <text x={x + barW/2} y={y - 6} textAnchor="middle" fill="#1E293B" fontSize="10" fontWeight="600">{d.value}</text>
            </g>
          </g>
        );
      })}
    </svg>
  );
}

function downloadCSV(filename, rows) {
  const BOM = '﻿'; // UTF-8 BOM for Excel Chinese support
  const csv = BOM + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function exportMerchantCSV(enterprises) {
  const headers = ['企业名称','统一社会信用代码','许可证号','所属镇','主体业态','法人姓名','风险等级','营业状态','最近工单数','导出时间'];
  const rows = [headers];
  enterprises.forEach(e => {
    rows.push([e.name, e.creditCode, e.licenseNo || '', e.town, e.entityType, e.legalPerson, e.riskLevel, e.bizStatus, String(e.recentOrders), new Date().toLocaleString('zh-CN')]);
  });
  const totalRow = ['','','','','','','','合计企业数',String(enterprises.length),''];
  rows.push(totalRow);
  downloadCSV(`商户台账_${new Date().toISOString().slice(0,10)}.csv`, rows);
}

function exportStaffCSV(enterprises) {

function StatCardCompact({ label, value, unit, color, onClick, badge }) {
  const colors = {
    red:    { dot:'bg-red-500',    accent:'text-red-600' },
    orange: { dot:'bg-orange-500', accent:'text-orange-600' },
    blue:   { dot:'bg-blue-500',   accent:'text-blue-600' },
    amber:  { dot:'bg-amber-500',  accent:'text-amber-600' },
    teal:   { dot:'bg-teal-500',   accent:'text-teal-600' },
  };
  const c = colors[color] || colors.blue;
  const [loaded, setLoaded] = useState(false);
  useEffect(() => { const t = setTimeout(() => setLoaded(true), 300 + Math.random() * 400); return () => clearTimeout(t); }, []);

  return (
    <div className="card-lift bg-white rounded-lg border border-slate-200 px-3.5 py-2.5 cursor-pointer animate-fade-in-up" onClick={onClick} style={{opacity: loaded ? 1 : 0}}>
      {!loaded ? (
        <div className="space-y-1.5">
          <Skeleton className="h-2.5 w-16" />
          <Skeleton className="h-6 w-12" />
        </div>
      ) : (
        <>
          <div className="flex items-center gap-1.5 mb-1">
            <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>
            <span className="text-[10px] text-ink-muted font-medium">{label}</span>
            {badge && <span className="ml-auto text-[9px] text-ink-muted bg-slate-50 px-1 rounded">{badge}</span>}
          </div>
          <div className={`text-xl font-bold ${c.accent} tracking-tight tabular-nums`}>
            {value.toLocaleString()}<span className="text-[10px] font-normal text-ink-muted ml-0.5">{unit}</span>
          </div>
        </>
      )}
    </div>
  );
}

}

// NOTIFICATIONS (3.8 通知与消息)
// ────────────────────────────────────────

function NotificationCenter() {
  const [filter, setFilter] = useState('all');
  const [notifs, setNotifs] = useState(MOCK.notifications);

  const filtered = filter === 'all' ? notifs : filter === 'unread' ? notifs.filter(n => !n.read) : notifs.filter(n => n.read);

  const markAllRead = () => setNotifs(notifs.map(n => ({...n, read:true})));
  const markRead = (id) => setNotifs(notifs.map(n => n.id === id ? {...n, read:true} : n));

  const typeStyles = {
    warning: { bg:'bg-amber-50', icon:'⚠', color:'text-amber-600' },
    info:    { bg:'bg-blue-50',  icon:'ℹ', color:'text-blue-600' },
    success: { bg:'bg-emerald-50', icon:'✓', color:'text-emerald-600' },
    error:   { bg:'bg-red-50', icon:'✕', color:'text-red-600' },
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold text-ink tracking-tight">通知信息</h1>
          <p className="text-sm text-ink-secondary mt-0.5">{notifs.filter(n=>!n.read).length} 条未读</p>
        </div>
        <button onClick={markAllRead} className="text-xs text-gov-600 hover:text-gov-700 font-medium">全部标为已读</button>
      </div>

      {/* Filter tabs */}
      <div className="flex gap-1 bg-white rounded-lg border border-slate-200 p-1 w-fit animate-fade-in-up">
        {[
          { key:'all', label:'全部' },
          { key:'unread', label:`未读 (${notifs.filter(n=>!n.read).length})` },
          { key:'read', label:'已读' },
        ].map(t => (
          <button key={t.key} onClick={() => setFilter(t.key)}
            className={`px-4 py-1.5 text-xs rounded-md transition-colors ${filter === t.key ? 'bg-gov-600 text-white' : 'text-ink-secondary hover:bg-slate-50'}`}
          >{t.label}</button>
        ))}
      </div>

      {/* Notification List */}
      <div className="space-y-1.5 animate-fade-in-up">
        {filtered.map(n => {
          const ts = typeStyles[n.type] || typeStyles.info;
          return (
            <div key={n.id}
              onClick={() => markRead(n.id)}
              className={`bg-white rounded-lg border px-4 py-3.5 cursor-pointer transition-all hover:shadow-sm ${!n.read ? 'border-l-[3px] border-l-gov-500 bg-gov-50/30' : 'border-slate-200'}`}
            >
              <div className="flex items-start gap-3">
                <div className={`w-8 h-8 rounded-md ${ts.bg} flex items-center justify-center shrink-0 ${ts.color}`}>
                  <span className="text-sm font-bold">{ts.icon}</span>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <h4 className={`text-sm ${!n.read ? 'font-semibold text-ink' : 'text-ink-secondary'}`}>{n.title}</h4>
                    {!n.read && <span className="w-1.5 h-1.5 rounded-full bg-gov-500 shrink-0"></span>}
                  </div>
                  <p className="text-[12.5px] text-ink-secondary mt-0.5">{n.content}</p>
                </div>
                <span className="text-[10px] text-ink-muted shrink-0 whitespace-nowrap">{n.time}</span>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div className="text-center py-16 text-ink-muted">
            <div className="text-4xl mb-3">◉</div>
            <div className="text-sm">暂无通知</div>
          </div>
        )}
      </div>
    </div>
  );
}
