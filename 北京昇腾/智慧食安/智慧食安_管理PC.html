function TrendChart({ data, width = 520, height = 200 }) {
  const points = useMemo(() => {
    if (!data.length) return '';
    const max = Math.max(...data.map(d => d.value));
    const min = 0;
    const range = max - min || 1;
    const pad = 0;
    const w = width - pad * 2;
    const h = height - pad * 2;
    return data.map((d, i) => {
      const x = pad + (i / Math.max(data.length - 1, 1)) * w;
      const y = pad + h - ((d.value - min) / range) * h;
      return `${x},${y}`;
    }).join(' ');
  }, [data, width, height]);

  const areaPath = useMemo(() => {
    if (!data.length) return '';
    const max = Math.max(...data.map(d => d.value));
    const range = max || 1;
    const pad = 0;
    const w = width - pad * 2;
    const h = height - pad * 2;
    let d = '';
    data.forEach((pt, i) => {
      const x = pad + (i / Math.max(data.length - 1, 1)) * w;
      const y = pad + h - ((pt.value) / range) * h;
      d += (i === 0 ? 'M' : 'L') + ` ${x},${y} `;
    });
    d += `L ${pad + w},${pad + h} L ${pad},${pad + h} Z`;
    return d;
  }, [data, width, height]);

  if (!data.length) return <div className="flex items-center justify-center text-ink-muted text-sm" style={{width,height}}>暂无数据</div>;

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#1A56DB" stopOpacity="0.15" />
          <stop offset="100%" stopColor="#1A56DB" stopOpacity="0.01" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill="url(#areaGrad)" />
      <polyline points={points} fill="none" stroke="#1A56DB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {data.map((d, i) => {
        const max = Math.max(...data.map(d => d.value));
        const range = max || 1;
        const pad = 0;
        const w = width - pad * 2;
        const h = height - pad * 2;
        const cx = pad + (i / Math.max(data.length - 1, 1)) * w;
        const cy = pad + h - ((d.value) / range) * h;
        return (
          <g key={i} className="group">
            <circle cx={cx} cy={cy} r="3.5" fill="white" stroke="#1A56DB" strokeWidth="2" />
            <circle cx={cx} cy={cy} r="10" fill="transparent" className="cursor-pointer" />
            <g className="opacity-0 group-hover:opacity-100 transition-opacity">
              <rect x={cx-22} y={cy-28} width="44" height="20" rx="4" fill="#1E293B" />
              <text x={cx} y={cy-13} textAnchor="middle" fill="white" fontSize="10" fontWeight="600">{d.value}</text>
            </g>
          </g>
        );
      })}
    </svg>
  );
}

function BarChart({ data, width = 400, height = 160 }) {
  const max = Math.max(...data.map(d => d.value), 1);
  const barW = Math.min(28, (width - 40) / data.length - 8);
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      {data.map((d, i) => {
        const barH = (d.value / max) * (height - 36);
        const x = 20 + i * ((width - 40) / data.length) + ((width-40)/data.length - barW)/2;
        const y = height - 20 - barH;
        return (
          <g key={i} className="group">
            <rect x={x} y={y} width={barW} height={barH} rx="3" fill={d.color || '#1A56DB'} opacity="0.85"
              className="transition-all duration-200 hover:opacity-100" />
            <text x={x + barW/2} y={height - 4} textAnchor="middle" fill="#94A3B8" fontSize="9">{d.label}</text>
            <g className="opacity-0 group-hover:opacity-100 transition-opacity">
              <text x={x + barW/2} y={y - 6} textAnchor="middle" fill="#1E293B" fontSize="10" fontWeight="600">{d.value}</text>
            </g>
          </g>
        );
      })}
    </svg>
  );
}

function downloadCSV(filename, rows) {
  const BOM = '﻿'; // UTF-8 BOM for Excel Chinese support
  const csv = BOM + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function exportMerchantCSV(enterprises) {
  const headers = ['企业名称','统一社会信用代码','许可证号','所属镇','主体业态','法人姓名','营业状态','最近工单数','导出时间'];

function StatCardCompact({ label, value, unit, color, onClick, badge }) {
  const colors = {
    red:    { dot:'bg-red-500',    accent:'text-red-600' },
    orange: { dot:'bg-orange-500', accent:'text-orange-600' },
    blue:   { dot:'bg-blue-500',   accent:'text-blue-600' },
    amber:  { dot:'bg-amber-500',  accent:'text-amber-600' },
    teal:   { dot:'bg-teal-500',   accent:'text-teal-600' },
  };
  const c = colors[color] || colors.blue;
  const [loaded, setLoaded] = useState(false);
  useEffect(() => { const t = setTimeout(() => setLoaded(true), 300 + Math.random() * 400); return () => clearTimeout(t); }, []);

  return (
    <div className="card-lift bg-white rounded-lg border border-slate-200 px-3.5 py-2.5 cursor-pointer animate-fade-in-up" onClick={onClick} style={{opacity: loaded ? 1 : 0}}>
      {!loaded ? (
        <div className="space-y-1.5">
          <Skeleton className="h-2.5 w-16" />
          <Skeleton className="h-6 w-12" />
        </div>
      ) : (
        <>
          <div className="flex items-center gap-1.5 mb-1">
            <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>
            <span className="text-[10px] text-ink-muted font-medium">{label}</span>
            {badge && <span className="ml-auto text-[9px] text-ink-muted bg-slate-50 px-1 rounded">{badge}</span>}
          </div>
          <div className={`text-xl font-bold ${c.accent} tracking-tight tabular-nums`}>
            {value.toLocaleString()}<span className="text-[10px] font-normal text-ink-muted ml-0.5">{unit}</span>
          </div>
        </>
      )}
    </div>
  );
}

                      <li className="flex items-start gap-1.5"><span className="mt-0.5">·</span>建议提前安排从业人员到指定医疗机构体检</li>
                    </>
                  ) : (
                    <>
                      <li className="flex items-start gap-1.5"><span className="mt-0.5">·</span>该证照即将到期，请及时办理续期手续</li>
                      <li className="flex items-start gap-1.5"><span className="mt-0.5">·</span>到期后将影响企业正常生产经营活动</li>
                    </>
                  )}
                </ul>
              </section>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

                    <div className="bg-slate-50 rounded-lg p-3 text-center">
                      <p className="text-xs text-ink-muted mb-1">⏳ 该工单已被驳回，等待商户重新提交</p>

                    </div>
                  ) : (
                    <div className="space-y-3">
                      <textarea
                        placeholder="输入审核意见（驳回时必填，限500字）…"
                        className="w-full border border-slate-200 rounded-md px-3 py-2 text-xs text-ink outline-none focus:border-gov-400 resize-none h-20"
                      ></textarea>
                      <div className="flex gap-2">
                        <button className="flex-1 py-2 bg-emerald-600 text-white text-sm font-medium rounded-md hover:bg-emerald-700 transition-colors">审核通过</button>
                        <button className="flex-1 py-2 bg-red-600 text-white text-sm font-medium rounded-md hover:bg-red-700 transition-colors">驳回（需填写原因）</button>
                      </div>
                    </div>
                  )}
                </section>
              ) : (
                <section className="bg-white rounded-lg border border-slate-200 p-4">
                  <h4 className="text-[11px] font-semibold text-ink-muted uppercase tracking-wider mb-3">审批结果</h4>
                  <div className={`p-4 rounded-lg ${showDetail.result === '通过' ? 'bg-emerald-50 border border-emerald-200' : 'bg-red-50 border border-red-200'}`}>
                    <div className="flex items-center gap-2 mb-2">
                      <Badge color={showDetail.result === '通过' ? 'green' : 'red'}>{showDetail.result === '通过' ? '✓ 审核通过' : '✕ 审核驳回'}</Badge>
                      <span className="text-[11px] text-ink-muted">{showDetail.reviewer} · {showDetail.reviewTime}</span>
                    </div>
                    <p className="text-xs text-ink leading-relaxed">{showDetail.reviewOpinion}</p>
                  </div>
                </section>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// DEVICE ASSOCIATION (3.7 设备关联)

function DeviceAssociation({ userRole, roleTown }) {
  const isDistrict = userRole === 'R01';
  const [searchQuery, setSearchQuery] = useState('');
  const [filterStatus, setFilterStatus] = useState('all');
  const [filterTown, setFilterTown] = useState(isDistrict ? 'all' : roleTown);
  const [filterLocation, setFilterLocation] = useState('all');
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [showManualModal, setShowManualModal] = useState(null);
  const [showAutoPanel, setShowAutoPanel] = useState(false);
  const [page, setPage] = useState(1);
  const pageSize = 20;
  const [toastMsg, setToastMsg] = useState(null);

  const toast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 2200); };

  // CSV export
  const handleExportCSV = () => {
    const headers = ['设备UUID','千里眼SN','安装位置','所属镇','关联商户','关联状态','匹配依据','IP地址','在线状态','安装日期'];
    const rows = MOCK.cameras.map(c => [
      c.deviceUuid, c.deviceSn, c.location, c.town,
      c.enterprise || (c.matchMerchant || ''), c.status === 'associated' ? '已关联' : c.status === 'auto_matched' ? '待确认' : '未关联',
      c.matchBasis || (c.status === 'associated' ? '人工确认' : ''), c.ip, c.online ? '在线' : '离线', c.installDate
    ]);
    const csv = [headers.join(','), ...rows.map(r => r.map(v => `"${v||''}"`).join(','))].join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `千里眼设备关联表_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    toast('CSV 导出成功');
  };

  // CSV import
  const fileInputRef = React.useRef(null);
  const handleImportCSV = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 2) { toast('CSV 格式无效：至少需要标题行和一条数据'); return; }
      // Skip BOM and header
      const headerLine = lines[0].replace(/^﻿/, '');
      const headers = headerLine.split(',').map(h => h.replace(/"/g,'').trim());
      const uuidIdx = headers.findIndex(h => h.includes('UUID'));
      const snIdx = headers.findIndex(h => h.includes('SN') || h.includes('序列号'));
      let imported = 0, updated = 0;
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',').map(c => c.replace(/^"|"$/g,'').trim());
        if (cols.length < 2) continue;
        const uuid = uuidIdx >= 0 ? cols[uuidIdx] : null;
        const sn = snIdx >= 0 ? cols[snIdx] : cols[1];
        // Find existing device by UUID or SN
        const existing = MOCK.cameras.find(c =>
          (uuid && c.deviceUuid === uuid) || (sn && c.deviceSn === sn)
        );
        if (existing && cols.length >= 5) {
          const merchantName = cols[4];
          if (merchantName) {
            existing.status = 'associated';
            existing.enterprise = merchantName;
            existing.matchBasis = 'CSV导入';
            existing.matchConfidence = 1.0;
            existing.matchMerchant = null;
            updated++;
          }
          imported++;
        }
      }
      toast(`CSV 导入完成：处理 ${imported} 条，更新关联 ${updated} 条`);
    };
    reader.readAsText(file, 'UTF-8');
    e.target.value = '';
  };

  const filtered = MOCK.cameras.filter(c => {
    if (!isDistrict && c.town !== roleTown) return false;
    if (filterStatus !== 'all' && c.status !== filterStatus) return false;
    if (filterTown !== 'all' && c.town !== filterTown) return false;
    if (filterLocation !== 'all' && !c.location.includes(filterLocation)) return false;
    if (searchQuery && !c.id.toLowerCase().includes(searchQuery.toLowerCase())
      && !c.deviceUuid.toLowerCase().includes(searchQuery.toLowerCase())
      && !c.deviceSn.toLowerCase().includes(searchQuery.toLowerCase())
      && !(c.enterprise||'').includes(searchQuery)
      && !c.location.includes(searchQuery)) return false;
    return true;
  });

  const totalPages = Math.ceil(filtered.length / pageSize);
  const pageData = filtered.slice((page - 1) * pageSize, page * pageSize);

  const isAllSelected = pageData.length > 0 && pageData.every(c => selectedIds.has(c.id));
  const toggleSelectAll = () => {
    const next = new Set(selectedIds);
    if (isAllSelected) { pageData.forEach(c => next.delete(c.id)); }
    else { pageData.forEach(c => next.add(c.id)); }
    setSelectedIds(next);
  };
  const toggleSelect = (id) => {
    const next = new Set(selectedIds);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedIds(next);
  };

  const stats = {
    total: MOCK.cameras.length,
    associated: MOCK.cameras.filter(c => c.status === 'associated').length,
    unassociated: MOCK.cameras.filter(c => c.status === 'unassociated').length,
    autoMatched: MOCK.cameras.filter(c => c.status === 'auto_matched').length,
  };

  // Locations for filter
  const locationGroups = ['后厨','前厅','仓库','出入口'];
  const towns = ['城东镇','南桥镇','中心镇','北关镇'];

  // Manual association
  const handleManualAssociate = (camId, enterpriseName) => {
    const cam = MOCK.cameras.find(c => c.id === camId);
    if (cam) {
      cam.status = 'associated';
      cam.enterprise = enterpriseName;
      cam.matchConfidence = 1.0;
      cam.matchMerchant = null;
    }
    setShowManualModal(null);
    toast(`摄像头 ${camId} 已关联至「${enterpriseName}」`);
  };

  // Batch unbind
  const handleBatchUnbind = () => {
    selectedIds.forEach(id => {
      const cam = MOCK.cameras.find(c => c.id === id);
      if (cam && cam.status !== 'unassociated') {
        cam.status = 'unassociated';
        cam.enterprise = null;
        cam.matchConfidence = null;
        cam.matchMerchant = null;
      }
    });
    toast(`已解绑 ${selectedIds.size} 个摄像头`);
    setSelectedIds(new Set());
  };

  // Auto-match
  const handleAutoMatch = () => {
    let matched = 0;
    const bases = ['IP地址段', '地理位置', '设备名称关键词'];
    MOCK.cameras.forEach(c => {
      if (c.status === 'unassociated') {
        // Simulate: match by town proximity to known merchants
        const merchantsInTown = MOCK.enterprises.filter(e => e.town === c.town);
        if (merchantsInTown.length > 0 && Math.random() > 0.3) {
          const pick = merchantsInTown[Math.floor(Math.random() * merchantsInTown.length)];
          c.status = 'auto_matched';
          c.matchMerchant = pick.name;
          c.matchBasis = bases[Math.floor(Math.random() * bases.length)];
          c.matchConfidence = parseFloat((0.60 + Math.random() * 0.35).toFixed(2));
          matched++;
        } else if (Math.random() > 0.7) {
          // Match to a random merchant in a different town
          const pick = MOCK.enterprises[Math.floor(Math.random() * MOCK.enterprises.length)];
          c.status = 'auto_matched';
          c.matchMerchant = pick.name;
          c.matchBasis = bases[Math.floor(Math.random() * bases.length)];
          c.matchConfidence = parseFloat((0.50 + Math.random() * 0.30).toFixed(2));
          matched++;
        }
      }
    });
    setShowAutoPanel(false);
    toast(`自动匹配完成，共 ${matched} 个摄像头待确认`);
  };

  // Batch confirm auto-match
  const handleBatchConfirm = () => {
    let confirmed = 0;
    selectedIds.forEach(id => {
      const cam = MOCK.cameras.find(c => c.id === id);
      if (cam && cam.status === 'auto_matched' && cam.matchMerchant) {
        cam.status = 'associated';
        cam.enterprise = cam.matchMerchant;
        cam.matchConfidence = 1.0;
        cam.matchMerchant = null;
        confirmed++;
      }
    });
    toast(`已确认关联 ${confirmed} 个摄像头`);
    setSelectedIds(new Set());
  };

  // Single confirm auto-match
  const handleConfirmMatch = (camId) => {
    const cam = MOCK.cameras.find(c => c.id === camId);
    if (cam && cam.status === 'auto_matched' && cam.matchMerchant) {
      cam.status = 'associated';
      cam.enterprise = cam.matchMerchant;
      cam.matchConfidence = 1.0;
      cam.matchMerchant = null;
      toast(`摄像头 ${camId} 已确认关联至「${cam.enterprise}」`);
    }
  };

  // Single unbind
  const handleUnbind = (camId) => {
    const cam = MOCK.cameras.find(c => c.id === camId);
    if (cam) {
      cam.status = 'unassociated';
      cam.enterprise = null;
      cam.matchConfidence = null;
      cam.matchMerchant = null;
      toast(`摄像头 ${camId} 已解绑`);
    }
  };

  const selectedCount = selectedIds.size;
  const hasAutoMatchedSelected = [...selectedIds].some(id => {
    const c = MOCK.cameras.find(c => c.id === id);
    return c && c.status === 'auto_matched';
  });

  return (
    <div className="space-y-4">
      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold text-ink tracking-tight">设备关联</h1>
          <p className="text-sm text-ink-secondary mt-0.5">
            移动千里眼设备与商户关联管理 · 支持手动关联、自动匹配与批量导入 · {stats.total} 台设备
          </p>
        </div>
        <div className="flex items-center gap-2">
          <input type="file" ref={fileInputRef} onChange={handleImportCSV} accept=".csv" className="hidden" />
          <button
            onClick={() => fileInputRef.current && fileInputRef.current.click()}
            className="text-xs font-medium px-3.5 py-2 rounded-md border transition-colors bg-white text-ink-secondary border-slate-300 hover:bg-slate-50"
            title="导入 CSV 文件批量更新设备关联"
          >
            <span className="mr-1">📥</span>导入 CSV
          </button>
          <button
            onClick={handleExportCSV}
            className="text-xs font-medium px-3.5 py-2 rounded-md border transition-colors bg-white text-ink-secondary border-slate-300 hover:bg-slate-50"
            title="导出当前设备列表为 CSV 文件"
          >
            <span className="mr-1">📤</span>导出 CSV
          </button>
          <button
            onClick={() => { setShowAutoPanel(!showAutoPanel); }}
            className={`text-xs font-medium px-3.5 py-2 rounded-md border transition-colors ${showAutoPanel ? 'bg-gov-600 text-white border-gov-600' : 'bg-white text-gov-600 border-gov-300 hover:bg-gov-50'}`}
          >
            <span className="mr-1">⟳</span>自动匹配
          </button>
          <span className="text-[11px] text-ink-muted">{stats.total} 台设备</span>
        </div>
      </div>

      {/* Stats summary */}
      <div className="grid grid-cols-4 gap-3 animate-fade-in-up">
        {[
          { label:'设备总数', value:stats.total, color:'slate' },
          { label:'已关联', value:stats.associated, color:'emerald' },
          { label:'未关联', value:stats.unassociated, color:'amber' },
          { label:'待确认', value:stats.autoMatched, color:'blue' },
        ].map((s, i) => (
          <div key={i} className="bg-white rounded-lg border border-slate-200 px-4 py-3 flex items-center justify-between">
            <div>
              <div className="text-[10px] text-ink-muted uppercase tracking-wider">{s.label}</div>
              <div className="text-2xl font-bold text-ink mt-0.5">{s.value}</div>
            </div>
            <div className={`w-2.5 h-2.5 rounded-full ${s.color==='emerald'?'bg-emerald-500':s.color==='amber'?'bg-amber-500':s.color==='blue'?'bg-blue-500':'bg-slate-400'}`}></div>
          </div>
        ))}
      </div>

      {/* Auto-match panel */}
      {showAutoPanel && (
        <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 animate-fade-in-up">
          <div className="flex items-start justify-between mb-3">
            <div>
              <h3 className="text-sm font-semibold text-blue-800">自动匹配规则</h3>
              <p className="text-[11px] text-blue-600 mt-0.5">系统根据千里眼设备元数据（IP地址段、安装位置、设备名称）与商户注册信息自动计算匹配度</p>
            </div>
            <button onClick={() => setShowAutoPanel(false)} className="text-blue-400 hover:text-blue-600 text-sm">✕</button>
          </div>
          <div className="grid grid-cols-3 gap-3 mb-3 text-[11px]">
            {(() => {
              const unassocCount = MOCK.cameras.filter(c => c.status === 'unassociated').length;
              const rules = [
                { title:'IP 地址段匹配', desc:'同网段（/24）千里眼设备优先匹配同镇商户', basis:'示例：192.168.1.x → 城东镇商户', estimate: Math.floor(unassocCount * 0.45) },
                { title:'地理位置匹配', desc:'摄像头安装地址与商户经营地址进行行政区划+道路级比对', basis:'示例："城东镇建设路12号" → 城东镇商户', estimate: Math.floor(unassocCount * 0.30) },
                { title:'设备名称关键词匹配', desc:'千里眼设备名称（店名/后厨等）与商户名称模糊匹配', basis:'示例：设备名含"永和" → "永和豆浆"', estimate: Math.floor(unassocCount * 0.18) },
              ];
              return rules.map((r, i) => (
                <div key={i} className="bg-white rounded-md border border-blue-200 p-2.5">
                  <div className="flex items-center justify-between mb-1">
                    <div className="font-medium text-blue-800">{r.title}</div>
                    <span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-medium">≈{r.estimate} 台</span>
                  </div>
                  <div className="text-blue-600 mb-1">{r.desc}</div>
                  <div className="text-[10px] text-blue-400 italic">{r.basis}</div>
                </div>
              ));
            })()}
          </div>

                  <div className="flex"><span className="text-ink-muted w-16 shrink-0">千里眼SN</span><span className="font-mono text-ink font-medium">{showManualModal.deviceSn}</span></div>
                  <div className="flex"><span className="text-ink-muted w-16 shrink-0">位置</span><span className="text-ink">{showManualModal.location}</span></div>
                  <div className="flex"><span className="text-ink-muted w-16 shrink-0">所属镇</span><span className="text-ink">{showManualModal.town}</span></div>
                  <div className="flex"><span className="text-ink-muted w-16 shrink-0">IP地址</span><span className="font-mono text-ink-secondary">{showManualModal.ip}</span></div>
                  {showManualModal.matchMerchant && (
                    <div className="flex"><span className="text-ink-muted w-16 shrink-0">当前匹配</span><span className="text-gov-600 font-medium">{showManualModal.matchMerchant}（{(showManualModal.matchConfidence*100).toFixed(0)}%）</span></div>
                  )}
                </div>
              </div>

              {/* Recent association records */}
              {recentAssociations.length > 0 && (
                <div>
                  <label className="text-[11px] font-semibold text-ink-muted uppercase tracking-wider mb-1.5 block">最近关联记录</label>
                  <div className="flex flex-wrap gap-1.5">
                    {recentAssociations.map(name => (
                      <button key={name}
                        onClick={() => handleManualAssociate(showManualModal.id, name)}
                        className="text-[11px] px-2.5 py-1.5 rounded-md bg-gov-50 text-gov-700 border border-gov-200 hover:bg-gov-100 transition-colors font-medium"

                    ))}

                </div>

                <div className="max-h-[220px] overflow-y-auto border border-slate-200 rounded-lg divide-y divide-slate-100">
                  {allFiltered.map(e => (
                    <div key={e.id}
                      onClick={() => handleManualAssociate(showManualModal.id, e.name)}

                    </div>

                    <div className="px-4 py-6 text-center text-[11px] text-ink-muted">未找到匹配的商户</div>

              </div>
            </div>
          </div>
        </div>
        );
      })}

      {/* Toast */}
      {toastMsg && (
        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] bg-slate-800 text-white text-xs px-5 py-2.5 rounded-lg shadow-lg flex items-center gap-2 animate-fade-in-up">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10B981" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          {toastMsg}
        </div>
      )}
    </div>
  );
}

// ────────────────────────────────────────
// NOTIFICATIONS (3.8 通知与消息)
// ────────────────────────────────────────

function NotificationCenter() {
  const [filter, setFilter] = useState('all');
  const [notifs, setNotifs] = useState(MOCK.notifications);

  const filtered = filter === 'all' ? notifs : filter === 'unread' ? notifs.filter(n => !n.read) : notifs.filter(n => n.read);

  const markAllRead = () => setNotifs(notifs.map(n => ({...n, read:true})));
  const markRead = (id) => setNotifs(notifs.map(n => n.id === id ? {...n, read:true} : n));

  const typeStyles = {
    warning: { bg:'bg-amber-50', icon:'⚠', color:'text-amber-600' },
    info:    { bg:'bg-blue-50',  icon:'ℹ', color:'text-blue-600' },
    success: { bg:'bg-emerald-50', icon:'✓', color:'text-emerald-600' },
    error:   { bg:'bg-red-50', icon:'✕', color:'text-red-600' },
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-xl font-bold text-ink tracking-tight">通知信息</h1>
          <p className="text-sm text-ink-secondary mt-0.5">{notifs.filter(n=>!n.read).length} 条未读</p>
        </div>
        <button onClick={markAllRead} className="text-xs text-gov-600 hover:text-gov-700 font-medium">全部标为已读</button>
      </div>

      {/* Filter tabs */}
      <div className="flex gap-1 bg-white rounded-lg border border-slate-200 p-1 w-fit animate-fade-in-up">
        {[
          { key:'all', label:'全部' },
          { key:'unread', label:`未读 (${notifs.filter(n=>!n.read).length})` },
          { key:'read', label:'已读' },
        ].map(t => (
          <button key={t.key} onClick={() => setFilter(t.key)}
            className={`px-4 py-1.5 text-xs rounded-md transition-colors ${filter === t.key ? 'bg-gov-600 text-white' : 'text-ink-secondary hover:bg-slate-50'}`}
          >{t.label}</button>
        ))}
      </div>

      {/* Notification List */}
      <div className="space-y-1.5 animate-fade-in-up">
        {filtered.map(n => {
          const ts = typeStyles[n.type] || typeStyles.info;
          return (
            <div key={n.id}
              onClick={() => markRead(n.id)}
              className={`bg-white rounded-lg border px-4 py-3.5 cursor-pointer transition-all hover:shadow-sm ${!n.read ? 'border-l-[3px] border-l-gov-500 bg-gov-50/30' : 'border-slate-200'}`}
            >
              <div className="flex items-start gap-3">
                <div className={`w-8 h-8 rounded-md ${ts.bg} flex items-center justify-center shrink-0 ${ts.color}`}>
                  <span className="text-sm font-bold">{ts.icon}</span>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <h4 className={`text-sm ${!n.read ? 'font-semibold text-ink' : 'text-ink-secondary'}`}>{n.title}</h4>
                    {!n.read && <span className="w-1.5 h-1.5 rounded-full bg-gov-500 shrink-0"></span>}
                  </div>
                  <p className="text-[12.5px] text-ink-secondary mt-0.5">{n.content}</p>
                </div>
                <span className="text-[10px] text-ink-muted shrink-0 whitespace-nowrap">{n.time}</span>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div className="text-center py-16 text-ink-muted">
            <div className="text-4xl mb-3">◉</div>
            <div className="text-sm">暂无通知</div>
          </div>
        )}
      </div>
    </div>
  );
}
